<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DrivHER Academy — Empowering Women. Redefining Mobility.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:        #E5167C;          /* primary brand pink from logo */
    --pink-deep:   #B8125F;
    --pink-soft:   #FCE4EE;
    --pink-tint:   #FFF1F7;
    --ink:         #0F0E13;          /* near-black */
    --ink-2:       #2A2731;
    --muted:       #6F6A78;
    --line:        #ECE7E1;
    --cream:       #FAF6F1;          /* warm off-white background */
    --cream-2:     #F3EDE5;
    --white:       #FFFFFF;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth; scroll-padding-top:80px}
  body{
    font-family:'Manrope', system-ui, sans-serif;
    color:var(--ink);
    background:var(--cream);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
    font-size:16px;
  }
  img{max-width:100%; display:block}
  a{color:inherit; text-decoration:none}
  button{font-family:inherit; cursor:pointer; border:none; background:none}

  .serif{font-family:'Instrument Serif', Georgia, serif; font-weight:400; letter-spacing:-0.01em;}
  h1, h2, h3, h4{font-family:'Instrument Serif', Georgia, serif; font-weight:400; letter-spacing:-0.01em; margin:0}
  h2{font-size:clamp(34px, 4.2vw, 58px); line-height:1.05}
  .container{max-width:1240px; margin:0 auto; padding:0 24px}
  @media(max-width:640px){ .container{padding:0 18px} }

  /* ---------------- NAV ---------------- */
  .nav{
    position:sticky; top:0; z-index:50;
    background:rgba(250,246,241,0.85);
    backdrop-filter:saturate(140%) blur(14px);
    -webkit-backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid rgba(15,14,19,0.06);
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    height:72px;
  }
  .logo{display:flex; align-items:center; gap:10px; position:relative; padding:6px 14px 6px 8px; border-radius:14px; transition:transform .2s, background .2s}
  .logo::before{
    content:''; position:absolute; inset:0; border-radius:14px;
    background:radial-gradient(60% 80% at 25% 50%, rgba(229,22,124,0.10), rgba(229,22,124,0) 70%);
    z-index:-1; opacity:0; transition:opacity .25s;
  }
  .logo:hover::before{opacity:1}
  .logo:hover{transform:translateY(-1px)}
  .logo img{width:150px; height:auto; display:block}
  @media(max-width:920px){ .logo img{width:135px} .logo{padding:4px 8px} }
  @media(max-width:480px){ .logo img{width:120px} }
  .nav-links{display:flex; align-items:center; gap:34px}
  .nav-links a{font-size:14.5px; font-weight:500; color:var(--ink-2); transition:color .15s}
  .nav-links a:hover{color:var(--pink)}
  .nav-cta, .nav-links a.nav-cta{
    background:var(--pink); color:var(--white) !important;
    padding:12px 22px; border-radius:999px;
    font-size:14px; font-weight:600;
    box-shadow:0 6px 16px -8px rgba(229,22,124,.55);
    transition:background .15s, transform .15s, box-shadow .15s;
  }
  .nav-cta:hover, .nav-links a.nav-cta:hover{background:var(--pink-deep); color:var(--white) !important; transform:translateY(-1px)}
  .nav-burger{display:none; width:44px; height:44px; align-items:center; justify-content:center; border-radius:10px}
  .nav-burger span{display:block; width:22px; height:2px; background:var(--ink); position:relative}
  .nav-burger span::before, .nav-burger span::after{content:''; position:absolute; left:0; width:22px; height:2px; background:var(--ink); transition:transform .25s}
  .nav-burger span::before{top:-7px}
  .nav-burger span::after{top:7px}
  .nav-burger.open span{background:transparent}
  .nav-burger.open span::before{transform:translateY(7px) rotate(45deg)}
  .nav-burger.open span::after{transform:translateY(-7px) rotate(-45deg)}

  @media(max-width:920px){
    .nav-links{
      position:absolute; top:64px; left:0; right:0;
      flex-direction:column; gap:0; align-items:stretch;
      background:var(--cream);
      border-bottom:1px solid var(--line);
      padding:12px 0 18px;
      transform:translateY(-12px); opacity:0; pointer-events:none;
      transition:opacity .2s, transform .2s;
    }
    .nav-links.open{opacity:1; transform:translateY(0); pointer-events:auto}
    .nav-links a{padding:14px 24px; border-bottom:1px solid var(--line)}
    .nav-links .nav-cta{margin:14px 24px 0; text-align:center; padding:14px 22px}
    .nav-burger{display:flex}
  }

  /* ---------------- HERO ---------------- */
  .hero{
    position:relative;
    padding:88px 0 0;
    overflow:hidden;
  }
  .hero-grid{
    display:grid; grid-template-columns: 1.05fr 0.95fr;
    gap:56px; align-items:center;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--pink-tint); color:var(--pink-deep);
    padding:8px 14px; border-radius:999px;
    font-size:13px; font-weight:600; letter-spacing:0.02em;
  }
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--pink)}
  .hero h1{
    font-family:'Instrument Serif', Georgia, serif;
    font-weight:400;
    font-size:clamp(44px, 6.2vw, 84px);
    line-height:1.08;
    letter-spacing:-0.02em;
    margin:18px 0 22px;
    color:var(--ink);
  }
  .hero h1 em{font-style:italic; color:var(--pink)}
  .hero p.lede{
    font-size:clamp(16px, 1.2vw, 18.5px);
    color:var(--muted);
    max-width:520px;
    margin:0 0 32px;
  }
  .cta-row{display:flex; gap:14px; flex-wrap:wrap}
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    padding:16px 26px; border-radius:999px;
    font-weight:600; font-size:15px;
    transition:transform .15s, background .15s, color .15s, box-shadow .15s;
  }
  .btn-primary{background:var(--pink); color:var(--white); box-shadow:0 8px 22px -10px rgba(229,22,124,.5)}
  .btn-primary:hover{background:var(--pink-deep); transform:translateY(-2px)}
  .btn-ghost{background:transparent; color:var(--ink); border:1.5px solid var(--ink)}
  .btn-ghost:hover{background:var(--ink); color:var(--white)}
  .btn-dark{background:var(--ink); color:var(--white)}
  .btn-dark:hover{background:var(--pink)}
  .arrow{transition:transform .15s}
  .btn:hover .arrow{transform:translateX(3px)}

  .hero-visual{
    position:relative;
    aspect-ratio:1/1.05;
    border-radius:24px;
    overflow:hidden;
    background:var(--ink);
  }
  .hero-photo{
    position:absolute; inset:0;
    background:#1d1b22;
    overflow:hidden;
  }
  .hero-photo img{width:100%; height:100%; object-fit:cover; display:block}
  .hero-stat-card{
    position:absolute; left:24px; bottom:24px;
    background:var(--white); border-radius:18px;
    padding:18px 22px;
    display:flex; gap:18px; align-items:center;
    box-shadow:0 18px 40px -18px rgba(15,14,19,.35);
    max-width:300px;
  }
  .hero-stat-card .num{
    font-family:'Instrument Serif', serif; font-size:44px; line-height:1; color:var(--pink);
  }
  .hero-stat-card .lbl{font-size:13px; color:var(--muted); line-height:1.35}
  .hero-pill{
    position:absolute; right:22px; top:22px;
    background:var(--pink); color:var(--white);
    padding:10px 16px; border-radius:999px;
    font-size:13px; font-weight:600;
    box-shadow:0 10px 24px -10px rgba(229,22,124,.5);
  }

  @media(max-width:920px){
    .hero{padding:48px 0 0}
    .hero-grid{grid-template-columns:1fr; gap:36px}
    .hero-visual{max-width:560px; margin:0 auto; width:100%}
    .hero-marquee{margin-top:48px}
  }

  /* ---------------- SECTION ---------------- */
  section{padding:120px 0}
  @media(max-width:768px){ section{padding:80px 0} }
  .section-head{
    display:flex; justify-content:space-between; align-items:flex-end;
    gap:40px; margin-bottom:64px;
  }
  .section-head .left{max-width:680px}
  .section-head h2{
    font-family:'Instrument Serif', serif; font-weight:400;
    font-size:clamp(34px, 4.2vw, 58px);
    line-height:1.05; letter-spacing:-0.015em;
    margin:14px 0 0;
  }
  .section-head h2 em{font-style:italic; color:var(--pink)}
  .section-head p{color:var(--muted); margin:18px 0 0; max-width:540px}
  @media(max-width:768px){
    .section-head{flex-direction:column; align-items:flex-start; gap:18px; margin-bottom:44px}
  }

  /* About */
  #about{background:var(--cream-2)}
  .about-grid{
    display:grid; grid-template-columns: 1fr 1.1fr; gap:64px; align-items:start;
  }
  .about-image{
    aspect-ratio:4/5;
    border-radius:24px; overflow:hidden;
    background:#dccfbd;
    position:relative;
  }
  .about-image > img{width:100%; height:100%; object-fit:cover; display:block}
  .about-image .float-card{
    position:absolute; right:-24px; top:36px;
    background:var(--white); border-radius:16px;
    padding:18px 22px;
    box-shadow:0 18px 40px -18px rgba(15,14,19,.3);
    max-width:230px;
  }
  .about-image .float-card .num{font-family:'Instrument Serif', serif; font-size:38px; line-height:1; color:var(--pink); display:block}
  .about-image .float-card .lbl{font-size:12px; color:var(--muted); margin-top:4px; display:block}

  .pillars{display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-top:36px}
  .pillar{
    background:var(--white); border-radius:18px; padding:24px;
    border:1px solid var(--line);
  }
  .pillar h4{font-family:'Instrument Serif',serif; font-weight:400; font-size:22px; margin:0 0 8px; color:var(--pink)}
  .pillar p{margin:0; font-size:14.5px; color:var(--muted); line-height:1.55}

  .values-row{
    display:flex; flex-wrap:wrap; gap:10px; margin-top:28px;
  }
  .value-chip{
    background:var(--white); border:1px solid var(--line);
    padding:10px 16px; border-radius:999px;
    font-size:13.5px; font-weight:500; color:var(--ink-2);
  }
  .value-chip::before{content:'•'; color:var(--pink); margin-right:8px; font-weight:700}
  @media(max-width:920px){
    .about-grid{grid-template-columns:1fr; gap:48px}
    .about-image{max-width:520px}
    .about-image .float-card{right:16px}
    .pillars{grid-template-columns:1fr}
  }

  /* Stats strip */
  .impact{
    background:var(--ink); color:var(--white);
    padding:80px 0;
  }
  .impact-grid{
    display:grid; grid-template-columns:repeat(4,1fr); gap:32px;
  }
  .impact-stat .num{
    font-family:'Instrument Serif', serif; font-size:clamp(48px,5vw,72px); line-height:1; color:var(--pink);
    display:flex; align-items:baseline; gap:4px;
  }
  .impact-stat .num sup{font-size:0.45em; color:var(--white); margin-left:2px; font-family:'Manrope',sans; font-weight:600; top:-0.6em}
  .impact-stat .lbl{font-size:14px; color:rgba(255,255,255,0.65); margin-top:10px; max-width:220px}
  .impact-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:48px; gap:30px}
  .impact-head h3{font-family:'Instrument Serif',serif; font-weight:400; font-size:clamp(28px,3.4vw,42px); margin:0; max-width:680px; line-height:1.1; letter-spacing:-0.01em}
  .impact-head h3 em{font-style:italic; color:var(--pink)}
  @media(max-width:768px){
    .impact-grid{grid-template-columns:repeat(2,1fr); gap:36px 24px}
    .impact-head{flex-direction:column; align-items:flex-start; margin-bottom:36px}
  }

  /* Programs */
  .program-tabs{
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:36px;
  }
  .program-tab{
    padding:10px 18px; border-radius:999px;
    background:transparent; border:1px solid var(--line);
    font-size:13.5px; font-weight:500; color:var(--ink-2);
    transition:all .15s;
  }
  .program-tab:hover{border-color:var(--ink)}
  .program-tab.active{background:var(--ink); color:var(--white); border-color:var(--ink)}

  .program-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:22px;
  }
  .program-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:22px; overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .25s, box-shadow .25s, border-color .25s;
  }
  .program-card:hover{transform:translateY(-4px); box-shadow:0 24px 50px -28px rgba(15,14,19,.25); border-color:transparent}
  .program-card .imgbox{
    aspect-ratio:16/10;
    background:#e8dccd;
    position:relative;
    border-bottom:1px solid var(--line);
    overflow:hidden;
  }
  .program-card .imgbox > img{width:100%; height:100%; object-fit:cover; display:block}
  .program-card .imgbox .num-tag{
    position:absolute; left:18px; top:18px;
    background:var(--white); color:var(--pink);
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Instrument Serif', serif; font-size:18px;
  }
  .program-card .imgbox .duration{
    position:absolute; right:14px; top:14px;
    background:rgba(15,14,19,0.85); color:var(--white);
    padding:6px 12px; border-radius:999px; font-size:11.5px; font-weight:500;
  }
  .program-card .body{padding:24px; display:flex; flex-direction:column; flex:1}
  .program-card h3{
    font-family:'Instrument Serif',serif; font-weight:400; font-size:24px;
    margin:0 0 8px; line-height:1.2;
  }
  .program-card .vehicle{font-size:12px; color:var(--pink); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px}
  .program-card p{font-size:14.5px; color:var(--muted); margin:0 0 18px; flex:1}
  .program-card ul{margin:0 0 22px; padding:0; list-style:none}
  .program-card li{
    font-size:13.5px; color:var(--ink-2); padding:6px 0;
    border-top:1px dashed var(--line);
    display:flex; align-items:center; gap:10px;
  }
  .program-card li:first-child{border-top:none}
  .program-card li::before{
    content:''; width:6px; height:6px; background:var(--pink); border-radius:50%; flex-shrink:0;
  }
  .program-card .more{
    font-size:14px; font-weight:600; color:var(--ink);
    display:inline-flex; align-items:center; gap:8px;
    margin-top:auto;
  }
  .program-card:hover .more{color:var(--pink)}
  @media(max-width:920px){ .program-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:600px){ .program-grid{grid-template-columns:1fr} }

  /* Why DrivHER */
  #why{background:var(--ink); color:var(--white)}
  #why .section-head h2{color:var(--white)}
  #why .section-head p{color:rgba(255,255,255,0.65)}
  #why .eyebrow{background:rgba(229,22,124,0.18); color:#FFB7D5}
  .why-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.08); border-radius:24px; overflow:hidden}
  .why-cell{
    background:var(--ink); padding:36px 30px;
    display:flex; flex-direction:column; gap:16px;
    transition:background .25s;
  }
  .why-cell:hover{background:#161420}
  .why-cell .icon{
    width:48px; height:48px; border-radius:14px;
    background:rgba(229,22,124,0.18); color:var(--pink);
    display:flex; align-items:center; justify-content:center;
    font-family:'Instrument Serif', serif; font-size:22px;
  }
  .why-cell h4{font-family:'Instrument Serif',serif; font-weight:400; font-size:24px; margin:0; line-height:1.15}
  .why-cell p{margin:0; color:rgba(255,255,255,0.6); font-size:14.5px; line-height:1.55}
  @media(max-width:768px){
    .why-grid{grid-template-columns:1fr}
  }

  /* Testimonials */
  .testimonials{background:var(--cream-2)}
  .test-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px}
  .test-card{
    background:var(--white); border-radius:22px; padding:30px;
    border:1px solid var(--line);
    display:flex; flex-direction:column; gap:18px;
  }
  .stars{color:var(--pink); letter-spacing:2px; font-size:14px}
  .test-card blockquote{
    margin:0; font-family:'Instrument Serif', serif;
    font-size:22px; line-height:1.3; letter-spacing:-0.005em;
    color:var(--ink);
  }
  .test-foot{display:flex; align-items:center; gap:14px; margin-top:auto; padding-top:18px; border-top:1px solid var(--line)}
  .avatar{
    width:46px; height:46px; border-radius:50%;
    background:var(--pink-soft); color:var(--pink);
    display:flex; align-items:center; justify-content:center;
    font-family:'Instrument Serif', serif; font-size:20px;
  }
  .test-foot .name{font-weight:600; font-size:14.5px; line-height:1.2}
  .test-foot .role{font-size:12.5px; color:var(--muted); margin-top:2px}
  @media(max-width:920px){.test-grid{grid-template-columns:1fr}}

  /* Pricing / Enrollment */
  .pricing-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px}
  .price-card{
    background:var(--white); border:1px solid var(--line);
    border-radius:22px; padding:34px 30px;
    display:flex; flex-direction:column; gap:18px;
    position:relative;
  }
  .price-card.featured{
    background:var(--ink); color:var(--white); border-color:var(--ink);
    transform:translateY(-12px);
  }
  .price-card.featured h3{color:var(--white)}
  .price-card.featured .desc{color:rgba(255,255,255,0.65)}
  .price-card.featured li{color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.12)}
  .price-card .badge{
    position:absolute; top:-14px; left:30px;
    background:var(--pink); color:var(--white);
    padding:6px 14px; border-radius:999px; font-size:11.5px; font-weight:600;
    letter-spacing:0.05em; text-transform:uppercase;
  }
  .price-card h3{font-family:'Instrument Serif',serif; font-weight:400; font-size:28px; margin:0; line-height:1.15}
  .price-card .desc{font-size:14px; color:var(--muted); margin:0}
  .price-card .price{
    font-family:'Instrument Serif', serif; font-size:52px; line-height:1; color:var(--ink); display:flex; align-items:baseline; gap:6px;
  }
  .price-card.featured .price{color:var(--pink)}
  .price-card .price .unit{font-family:'Manrope',sans-serif; font-size:14px; font-weight:500; color:var(--muted)}
  .price-card.featured .price .unit{color:rgba(255,255,255,0.6)}
  .price-card ul{list-style:none; margin:0; padding:0}
  .price-card li{font-size:14px; padding:12px 0; border-top:1px dashed var(--line); display:flex; gap:10px; align-items:flex-start; color:var(--ink-2)}
  .price-card li:first-child{border-top:none}
  .price-card li::before{content:'✓'; color:var(--pink); font-weight:700; flex-shrink:0}
  .price-card .btn{justify-content:center; width:100%}
  @media(max-width:920px){
    .pricing-grid{grid-template-columns:1fr; gap:18px}
    .price-card.featured{transform:none}
  }

  /* Contact */
  #contact{background:var(--cream-2)}
  .contact-grid{display:grid; grid-template-columns:1fr 1.05fr; gap:56px; align-items:start}
  .contact-info h3{font-family:'Instrument Serif',serif; font-weight:400; font-size:36px; margin:14px 0 14px; line-height:1.1}
  .contact-info p{color:var(--muted); margin:0 0 32px; max-width:420px}
  .contact-list{display:flex; flex-direction:column; gap:16px; margin-bottom:36px}
  .contact-item{
    display:flex; align-items:center; gap:14px;
    padding:16px 18px; background:var(--white);
    border:1px solid var(--line); border-radius:16px;
  }
  .contact-item .ico{
    width:40px; height:40px; border-radius:12px;
    background:var(--pink-tint); color:var(--pink);
    display:flex; align-items:center; justify-content:center; font-size:18px;
    flex-shrink:0;
  }
  .contact-item .lbl{font-size:12.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em}
  .contact-item .val{font-weight:600; font-size:15px; margin-top:2px}
  .socials{display:flex; gap:10px}
  .social{
    width:42px; height:42px; border-radius:50%;
    background:var(--white); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    transition:all .15s;
  }
  .social:hover{background:var(--pink); color:var(--white); border-color:var(--pink)}

  .contact-form{
    background:var(--white); border-radius:22px; padding:34px;
    border:1px solid var(--line);
  }
  .contact-form h4{font-family:'Instrument Serif',serif; font-weight:400; font-size:26px; margin:0 0 6px}
  .contact-form .sub{color:var(--muted); font-size:14px; margin:0 0 24px}

<div id="fillout-trigger-wrap" style="position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;left:-9999px;top:-9999px;" aria-hidden="true">
  <div data-zite-id="7hzbsbhx4z" data-zite-embed-type="popup" data-zite-button-text="Apply and Enroll" data-zite-button-size="large" data-zite-inherit-parameters data-zite-popup-size="large"></div>
</div>

<!-- Floating mobile enroll button -->
<div id="float-enroll" style="position:fixed;bottom:24px;right:24px;z-index:200;display:none">
  <button onclick="openEnrollPopup()" style="background:#E5167C;color:#fff;border:none;border-radius:999px;padding:16px 26px;font-family:Manrope,sans-serif;font-size:15px;font-weight:700;box-shadow:0 8px 28px -8px rgba(229,22,124,.6);cursor:pointer;display:flex;align-items:center;gap:8px;transition:transform .15s,background .15s" onmouseenter="this.style.background='#B8125F';this.style.transform='translateY(-2px)'" onmouseleave="this.style.background='#E5167C';this.style.transform='translateY(0)'">
    Apply &amp; Enroll →
  </button>
</div>

<script>
function openEnrollPopup(){
  // Find the Fillout-generated button inside the hidden wrapper and click it
  var btn = document.querySelector('#fillout-trigger-wrap button');
  if(btn){ btn.click(); return; }
  // Fallback: try any anchor or clickable element Fillout rendered
  var el = document.querySelector('#fillout-trigger-wrap [data-zite-id]');
  if(el){ el.click(); }
}

// Show floating button on mobile only (< 768px)
function checkFloat(){
  document.getElementById('float-enroll').style.display = window.innerWidth < 768 ? 'block' : 'none';
}
checkFloat();
window.addEventListener('resize', checkFloat);
</script>
